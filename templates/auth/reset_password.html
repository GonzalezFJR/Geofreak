{% extends "pages/_base_page.html" %}

{% block title %}{{ t('auth.reset_title', lang) }}{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>{{ t('auth.reset_h', lang) | safe }}</h2>
        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/reset-password">
            <input type="hidden" name="token" value="{{ token }}">
            <input type="password" name="password" placeholder="{{ t('auth.new_password', lang) }}" required autocomplete="new-password" minlength="8">
            <input type="password" name="password2" placeholder="{{ t('auth.repeat_password', lang) }}" required autocomplete="new-password" minlength="8">
            <button type="submit">{{ t('auth.reset_btn', lang) }}</button>
        </form>
    </div>
</div>
{% endblock %}
