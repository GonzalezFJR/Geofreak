{% extends "pages/_base_page.html" %}
{% block title %}404 — GeoFreak{% endblock %}

{% block content %}
<section class="page-404">
    <div class="page-404-inner">
        <svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Water surface line -->
            <ellipse cx="90" cy="130" rx="70" ry="6" fill="#d0e4f7" opacity="0.5"/>
            <!-- Ripples -->
            <circle class="ripple1" cx="90" cy="130" r="0" fill="none" stroke="#1a73e8" stroke-width="1.5" opacity="0"/>
            <circle class="ripple2" cx="90" cy="130" r="0" fill="none" stroke="#1a73e8" stroke-width="1.2" opacity="0"/>
            <circle class="ripple3" cx="90" cy="130" r="0" fill="none" stroke="#1a73e8" stroke-width="1" opacity="0"/>
            <!-- Water drop -->
            <g class="drop-anim">
                <path d="M90 62 C90 62, 74 90, 74 104 C74 113, 81 120, 90 120 C99 120, 106 113, 106 104 C106 90, 90 62, 90 62Z" fill="url(#dropGrad)"/>
                <ellipse cx="84" cy="100" rx="4" ry="6" fill="white" opacity="0.4" transform="rotate(-15 84 100)"/>
            </g>
            <!-- Gradient def -->
            <defs>
                <linearGradient id="dropGrad" x1="90" y1="62" x2="90" y2="120" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#64b5f6"/>
                    <stop offset="100%" stop-color="#1565c0"/>
                </linearGradient>
            </defs>
        </svg>
        <h1>{{ t('err.404_title', lang) }}</h1>
        <p>{{ t('err.404_text', lang) }}</p>
        <a href="/">{{ t('err.back_home', lang) }}</a>
    </div>
</section>
{% endblock %}
