<!-- Game Instructions Modal — reusable partial.
     Include once; open with GeoFreak.showGameInstructions(gameId, lang) -->
<div class="gi-overlay" id="gi-modal" style="display:none" role="dialog" aria-modal="true">
    <div class="gi-card">
        <button class="gi-close" id="gi-close" aria-label="{{ t('gi.close', lang) }}">&times;</button>
        <div class="gi-header">
            <img class="gi-icon" id="gi-icon" src="" width="64" height="64" alt="">
            <div>
                <h2 class="gi-title" id="gi-title"></h2>
                <p class="gi-desc" id="gi-desc"></p>
            </div>
        </div>
        <div class="gi-sections">
            <div class="gi-section">
                <h3><span class="gi-section-icon">🎯</span> {{ t('gi.how_to_play', lang) }}</h3>
                <p id="gi-how"></p>
            </div>
            <div class="gi-section">
                <h3><span class="gi-section-icon">⭐</span> {{ t('gi.scoring', lang) }}</h3>
                <p id="gi-scoring"></p>
            </div>
            <div class="gi-section">
                <h3><span class="gi-section-icon">💡</span> {{ t('gi.tips', lang) }}</h3>
                <p id="gi-tips"></p>
            </div>
        </div>
        <button class="btn btn-primary gi-close-btn" id="gi-close-btn">{{ t('gi.close', lang) }}</button>
    </div>
</div>

<script>
(function () {
    var GAME_INSTRUCTIONS = {
        ordering: {
            desc: {{ t('gi.ordering_desc', lang)|tojson }},
            scoring: {{ t('gi.ordering_scoring', lang)|tojson }},
            tip: {{ t('gi.ordering_tip', lang)|tojson }}
        },
        comparison: {
            desc: {{ t('gi.comparison_desc', lang)|tojson }},
            scoring: {{ t('gi.comparison_scoring', lang)|tojson }},
            tip: {{ t('gi.comparison_tip', lang)|tojson }}
        },
        geostats: {
            desc: {{ t('gi.geostats_desc', lang)|tojson }},
            scoring: {{ t('gi.geostats_scoring', lang)|tojson }},
            tip: {{ t('gi.geostats_tip', lang)|tojson }}
        },
        flags: {
            desc: {{ t('gi.flags_desc', lang)|tojson }},
            scoring: {{ t('gi.flags_scoring', lang)|tojson }},
            tip: {{ t('gi.flags_tip', lang)|tojson }}
        },
        outline: {
            desc: {{ t('gi.outline_desc', lang)|tojson }},
            scoring: {{ t('gi.outline_scoring', lang)|tojson }},
            tip: {{ t('gi.outline_tip', lang)|tojson }}
        }
    };

    /* Game display names — filled from contents.json data injected in cards */
    var GAME_NAMES = {};
    document.querySelectorAll('[data-game-id]').forEach(function (el) {
        GAME_NAMES[el.getAttribute('data-game-id')] = el.getAttribute('data-game-name') || '';
    });

    var overlay = document.getElementById('gi-modal');
    var closeBtn = document.getElementById('gi-close');
    var closeBtnBot = document.getElementById('gi-close-btn');

    function show(gameId) {
        var info = GAME_INSTRUCTIONS[gameId];
        if (!info) return;
        document.getElementById('gi-icon').src = '/static/img/icons/' + gameId + '.svg';
        document.getElementById('gi-title').textContent = GAME_NAMES[gameId] || gameId;
        document.getElementById('gi-desc').textContent = '';
        document.getElementById('gi-how').textContent = info.desc;
        document.getElementById('gi-scoring').textContent = info.scoring;
        document.getElementById('gi-tips').textContent = info.tip;
        overlay.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function hide() {
        overlay.style.display = 'none';
        document.body.style.overflow = '';
    }

    if (closeBtn) closeBtn.addEventListener('click', hide);
    if (closeBtnBot) closeBtnBot.addEventListener('click', hide);
    overlay.addEventListener('click', function (e) { if (e.target === overlay) hide(); });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') hide(); });

    window.GeoFreak = window.GeoFreak || {};
    window.GeoFreak.showGameInstructions = show;
    window.GeoFreak.GAME_INSTRUCTIONS = GAME_INSTRUCTIONS;
})();
</script>
