{% extends "games/_base_game.html" %}

{% block game_area %}
<div class="quiz-container">
    <div class="quiz-progress">
        {{ t('quiz.flag', lang) }} <span id="q-current">1</span> {{ t('quiz.of', lang) }} <span id="q-total">?</span>
    </div>
    <div class="quiz-display" id="quiz-display"></div>
    <div class="quiz-input-area">
        <input type="text" id="answer-input" placeholder="{{ t('quiz.placeholder', lang) }}" autocomplete="off">
        <button class="btn-skip" onclick="QuizGame.skip()">{{ t('quiz.skip', lang) }}</button>
        <button class="btn-reveal" onclick="QuizGame.reveal()">{{ t('quiz.reveal', lang) }}</button>
    </div>
    <div class="quiz-feedback" id="quiz-feedback"></div>
</div>
{% endblock %}

{% block game_scripts %}
<script src="/static/js/games/quiz-game.js"></script>
<script>
    QuizGame.init({
        displayItem: function (country, el) {
            var img = document.createElement('img');
            img.className = 'quiz-flag';
            img.alt = T['quiz.flag'] || 'Flag';
            img.src = '/static/data/images/flags/' + country.iso_a3 + '.svg';
            img.onerror = function () {
                el.innerHTML = '<div style="padding:40px;color:#94a3b8;">' + (T['quiz.no_flag'] || '🏳️ No flag') + '</div>';
            };
            el.appendChild(img);
        },
        getAnswers: function (country) {
            return GeoUtils.getCountryNames(country);
        }
    });
</script>
{% endblock %}
