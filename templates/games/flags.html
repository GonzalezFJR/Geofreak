{% extends "games/_base_game.html" %}

{% block extra_settings %}
<div class="setting-group">
    <label>Número de preguntas</label>
    <select id="setting-max-items">
        <option value="10">10</option>
        <option value="20">20</option>
        <option value="30" selected>30</option>
        <option value="50">50</option>
        <option value="0">Todas</option>
    </select>
</div>
{% endblock %}

{% block game_area %}
<div class="quiz-container">
    <div class="quiz-progress">
        Bandera <span id="q-current">1</span> de <span id="q-total">?</span>
    </div>
    <div class="quiz-display" id="quiz-display"></div>
    <div class="quiz-input-area">
        <input type="text" id="answer-input" placeholder="Nombre del país…" autocomplete="off">
        <button class="btn-skip" onclick="QuizGame.skip()">Saltar ⏭️</button>
        <button class="btn-reveal" onclick="QuizGame.reveal()">👁️ Desvelar</button>
    </div>
    <div class="quiz-feedback" id="quiz-feedback"></div>
</div>
{% endblock %}

{% block game_scripts %}
<script src="/static/js/games/quiz-game.js"></script>
<script>
    QuizGame.init({
        displayItem: function (country, el) {
            var img = document.createElement('img');
            img.className = 'quiz-flag';
            img.alt = 'Bandera';
            img.src = '/static/data/images/flags/' + country.iso_a3 + '.svg';
            img.onerror = function () {
                el.innerHTML = '<div style="padding:40px;color:#94a3b8;">🏳️ Sin bandera</div>';
            };
            el.appendChild(img);
        },
        getAnswers: function (country) {
            return GeoUtils.getCountryNames(country);
        }
    });
</script>
{% endblock %}
