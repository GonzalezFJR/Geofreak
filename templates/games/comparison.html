{% extends "games/_base_game.html" %}

{% block extra_settings %}
<div class="setting-group">
    <label>{{ t('game.nquestions', lang) }}</label>
    <select id="setting-max-items">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="15">15</option>
        <option value="20">20</option>
    </select>
</div>
{% endblock %}

{% block game_area %}
<div class="comparison-container" id="comparison-container">
    <div class="comparison-header">
        <div class="comparison-progress">
            {{ t('cmp.question', lang) }} <span id="q-current">1</span> {{ t('quiz.of', lang) }} <span id="q-total">?</span>
        </div>
        <div class="comparison-prompt" id="comparison-prompt"></div>
    </div>
    <div class="comparison-cards" id="comparison-cards"></div>
    <div class="comparison-feedback" id="comparison-feedback"></div>
</div>
{% endblock %}

{% block game_scripts %}
<script src="/static/js/games/comparison-game.js"></script>
{% endblock %}
