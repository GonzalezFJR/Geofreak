{% extends "games/_base_game.html" %}

{% block game_area %}
<div class="map-game-container">
<!-- Click/locate mode prompt (polygon datasets) -->
<div class="map-game-prompt" id="game-prompt" style="display:none">
    <span class="prompt-country" id="prompt-country"></span>
    <span class="prompt-label" id="prompt-text"></span>
    <input type="text" id="answer-input-locate" autocomplete="off" placeholder="">
    <button class="btn-reveal-map" onclick="MapGame.reveal()">👁️</button>
</div>
<!-- Cities locate prompt -->
<div class="map-game-prompt map-city-prompt" id="city-locate-prompt" style="display:none">
    <span class="prompt-label" id="city-locate-text"></span>
</div>
<!-- Type/name mode bar -->
<div class="map-game-input-bar" id="game-input-bar" style="display:none">
    <input type="text" id="answer-input-name" autocomplete="off" placeholder="">
    <button class="btn-reveal-map-bar" id="btn-reveal-bar" onclick="MapGame.reveal()" disabled>{{ t('quiz.reveal', lang) }}</button>
    <div class="input-feedback" id="input-feedback"></div>
</div>
<div id="game-map" class="game-map"></div>
</div>

<!-- Settings from config page (URL query params → template context) -->
<input type="hidden" id="map-dataset-value"       value="{{ map_dataset }}">
<input type="hidden" id="map-continent-value"     value="{{ map_continent }}">
<input type="hidden" id="map-entity-type-value"   value="{{ map_entity_type }}">
<input type="hidden" id="map-city-filter-value"   value="{{ map_city_filter }}">
<input type="hidden" id="map-city-continent-value" value="{{ map_city_continent }}">
<input type="hidden" id="map-mode-value"          value="{{ map_mode }}">
{% endblock %}

{% block game_scripts %}
<script src="/static/js/games/map-game.js"></script>
<script>
    MapGame.init();
</script>
{% endblock %}
