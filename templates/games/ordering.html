{% extends "games/_base_game.html" %}

{% block extra_settings %}
<div class="setting-group">
    <label>{{ t('game.nquestions', lang) }}</label>
    <select id="setting-max-items">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="15">15</option>
    </select>
</div>
{% endblock %}

{% block game_area %}
<div class="ordering-container" id="ordering-container">
    <div class="ordering-header">
        <div class="ordering-progress">
            {{ t('ord.question', lang) }} <span id="q-current">1</span> {{ t('quiz.of', lang) }} <span id="q-total">?</span>
        </div>
        <div class="ordering-prompt" id="ordering-prompt"></div>
    </div>
    <div class="ordering-items" id="ordering-items"></div>
    <div class="ordering-actions">
        <button class="btn btn-primary" id="btn-confirm" onclick="OrderingGame.confirm()">{{ t('ord.confirm', lang) }}</button>
    </div>
    <div class="ordering-feedback" id="ordering-feedback"></div>
</div>
{% endblock %}

{% block game_scripts %}
<script src="/static/js/games/ordering-game.js"></script>
{% endblock %}
