<!-- ─── Game Customization Modal ─────────────────────────────────────────── -->
<div class="customize-modal" id="customize-modal" style="display:none" role="dialog" aria-modal="true">
    <div class="customize-modal-card">
        <button class="customize-modal-close" onclick="GeoCustomize.closeModal()" aria-label="Close">&times;</button>
        <h3 class="customize-modal-title">{{ t('cust.title', lang) }}</h3>

        <!-- Dataset type -->
        <div class="cust-section">
            <div class="cust-radio-group">
                <label class="cust-radio-label">
                    <input type="radio" name="cust-dataset" id="cust-radio-countries" value="countries" checked>
                    🌍 {{ t('mg.dataset_countries', lang) }}
                </label>
                <label class="cust-radio-label">
                    <input type="radio" name="cust-dataset" id="cust-radio-regions" value="regions">
                    🗺️ {{ t('cust.regions', lang) }}
                </label>
            </div>
        </div>

        <!-- Countries sub-options -->
        <div id="cust-countries-options">
            <div class="cust-field">
                <label class="cust-label">{{ t('mg.fil_continent', lang) }}</label>
                <select id="cust-continent" class="cust-select">
                    <option value="all">{{ t('mg.cont_all', lang) }}</option>
                    <option value="europe">{{ t('mg.cont_europe', lang) }}</option>
                    <option value="asia">{{ t('mg.cont_asia', lang) }}</option>
                    <option value="africa">{{ t('mg.cont_africa', lang) }}</option>
                    <option value="americas">{{ t('mg.cont_americas', lang) }}</option>
                    <option value="oceania">{{ t('mg.cont_oceania', lang) }}</option>
                </select>
            </div>
            <div class="cust-field">
                <label class="cust-label">{{ t('mg.fil_type', lang) }}</label>
                <select id="cust-entity-type" class="cust-select">
                    <option value="all">{{ t('mg.type_all', lang) }}</option>
                    <option value="country">{{ t('mg.type_country', lang) }}</option>
                    <option value="territory">{{ t('mg.type_territory', lang) }}</option>
                </select>
            </div>
        </div>

        <!-- Regions sub-options -->
        <div id="cust-regions-options" style="display:none">
            <div class="cust-field">
                <label class="cust-label">{{ t('cust.region_set', lang) }}</label>
                <select id="cust-sub-dataset" class="cust-select">
                    <option value="us-states">🇺🇸 {{ t('mg.dataset_us', lang) }}</option>
                    <option value="spain-provinces">🇪🇸 {{ t('mg.dataset_spain', lang) }}</option>
                    <option value="russia-regions">🇷🇺 {{ t('mg.dataset_russia', lang) }}</option>
                    <option value="france-regions">🇫🇷 {{ t('mg.dataset_france', lang) }}</option>
                    <option value="italy-regions">🇮🇹 {{ t('mg.dataset_italy', lang) }}</option>
                    <option value="germany-states">🇩🇪 {{ t('mg.dataset_germany', lang) }}</option>
                </select>
            </div>
        </div>

        <button class="btn btn-primary cust-apply-btn" onclick="GeoCustomize.applyAndClose()">
            {{ t('cust.apply', lang) }}
        </button>
    </div>
</div>
