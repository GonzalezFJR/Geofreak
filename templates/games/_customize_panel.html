<!-- ─── Inline Game Customization Panel ──────────────────────────────────── -->
<div class="gcust-panel" id="gcust-panel" style="display:none">
    <hr class="gcust-hr">

    <!-- Type tabs: Countries / Regions -->
    <div class="gcust-type-tabs" id="gcust-type-tabs">
        <button class="gcust-tab active" data-type="countries">
            🌍 {{ t('mg.dataset_countries', lang) }}
        </button>
        <button class="gcust-tab" data-type="regions">
            🗺️ {{ t('cust.regions', lang) }}
        </button>
    </div>

    <!-- Countries options -->
    <div id="gcust-countries-opts">
        <div class="gcust-group">
            <div class="gcust-group-label">{{ t('mg.fil_continent', lang) }}</div>
            <div class="mcfg-pills" id="gcust-continent-pills">
                <button class="mcfg-pill active" data-value="all">{{ t('mg.cont_all', lang) }}</button>
                <button class="mcfg-pill" data-value="europe">{{ t('mg.cont_europe', lang) }}</button>
                <button class="mcfg-pill" data-value="asia">{{ t('mg.cont_asia', lang) }}</button>
                <button class="mcfg-pill" data-value="africa">{{ t('mg.cont_africa', lang) }}</button>
                <button class="mcfg-pill" data-value="americas">{{ t('mg.cont_americas', lang) }}</button>
                <button class="mcfg-pill" data-value="oceania">{{ t('mg.cont_oceania', lang) }}</button>
            </div>
        </div>
    </div>

    <!-- Regions options -->
    <div id="gcust-regions-opts" style="display:none">
        <div class="gcust-group">
            <div class="mcfg-region-cards gcust-region-cards" id="gcust-region-cards">
                <button class="mcfg-region-card active" data-value="us-states">
                    <div class="mcfg-region-card-icon">
                        <img src="/static/img/icons/cfg-region-us.svg" width="32" height="32" alt="">
                    </div>
                    <span class="mcfg-region-card-label">{{ t('mg.dataset_us', lang) }}</span>
                </button>
                <button class="mcfg-region-card" data-value="spain-provinces">
                    <div class="mcfg-region-card-icon">
                        <img src="/static/img/icons/cfg-region-spain.svg" width="32" height="32" alt="">
                    </div>
                    <span class="mcfg-region-card-label">{{ t('mg.dataset_spain', lang) }}</span>
                </button>
                <button class="mcfg-region-card" data-value="russia-regions">
                    <div class="mcfg-region-card-icon">
                        <img src="/static/img/icons/cfg-region-russia.svg" width="32" height="32" alt="">
                    </div>
                    <span class="mcfg-region-card-label">{{ t('mg.dataset_russia', lang) }}</span>
                </button>
                <button class="mcfg-region-card" data-value="france-regions">
                    <div class="mcfg-region-card-icon">
                        <img src="/static/img/icons/cfg-region-france.svg" width="32" height="32" alt="">
                    </div>
                    <span class="mcfg-region-card-label">{{ t('mg.dataset_france', lang) }}</span>
                </button>
                <button class="mcfg-region-card" data-value="italy-regions">
                    <div class="mcfg-region-card-icon">
                        <img src="/static/img/icons/cfg-region-italy.svg" width="32" height="32" alt="">
                    </div>
                    <span class="mcfg-region-card-label">{{ t('mg.dataset_italy', lang) }}</span>
                </button>
                <button class="mcfg-region-card" data-value="germany-states">
                    <div class="mcfg-region-card-icon">
                        <img src="/static/img/icons/cfg-region-germany.svg" width="32" height="32" alt="">
                    </div>
                    <span class="mcfg-region-card-label">{{ t('mg.dataset_germany', lang) }}</span>
                </button>
            </div>
        </div>
    </div>
</div>
