<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" fill="none">
  <defs>
    <clipPath id="flag-clip-fr">
      <rect x="2" y="2" width="36" height="36" rx="3"/>
    </clipPath>
  </defs>

  <!-- Blue left strip -->
  <rect x="2" y="2" width="12" height="36" fill="#002395" clip-path="url(#flag-clip-fr)"/>

  <!-- White center strip -->
  <rect x="14" y="2" width="12" height="36" fill="#EDEDED" clip-path="url(#flag-clip-fr)"/>

  <!-- Red right strip -->
  <rect x="26" y="2" width="12" height="36" fill="#ED2939" clip-path="url(#flag-clip-fr)"/>

  <!-- Light gray border -->
  <rect x="2" y="2" width="36" height="36" rx="3" stroke="#d1d5db" stroke-width="1" fill="none"/>
</svg>
