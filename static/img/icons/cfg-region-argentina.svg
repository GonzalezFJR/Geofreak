<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" fill="none">
  <defs>
    <clipPath id="flag-clip-ar">
      <rect x="2" y="2" width="36" height="36" rx="3"/>
    </clipPath>
  </defs>

  <!-- Light blue top strip -->
  <rect x="2" y="2"  width="36" height="12" fill="#74ACDF" clip-path="url(#flag-clip-ar)"/>

  <!-- White center strip -->
  <rect x="2" y="14" width="36" height="12" fill="#FFFFFF" clip-path="url(#flag-clip-ar)"/>

  <!-- Light blue bottom strip -->
  <rect x="2" y="26" width="36" height="12" fill="#74ACDF" clip-path="url(#flag-clip-ar)"/>

  <!-- Sun of May (simplified) -->
  <circle cx="20" cy="20" r="3" fill="#F6B40E"/>

  <!-- Light gray border -->
  <rect x="2" y="2" width="36" height="36" rx="3" stroke="#d1d5db" stroke-width="1" fill="none"/>
</svg>
