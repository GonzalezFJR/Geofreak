<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <style>
    .card-back {
      transform-origin: 32px 32px;
      animation: flip 3.5s ease-in-out infinite;
    }
    .card-front {
      transform-origin: 32px 32px;
      animation: flip-front 3.5s ease-in-out infinite;
    }
    .question-mark {
      transform-origin: 32px 32px;
      animation: flip-front 3.5s ease-in-out infinite;
    }
    @keyframes flip {
      0%, 35%, 100% { transform: scaleX(1); opacity: 1; }
      45%, 55%      { transform: scaleX(0); opacity: 0; }
      65%, 90%      { transform: scaleX(1); opacity: 1; }
    }
    @keyframes flip-front {
      0%, 40%       { transform: scaleX(0); opacity: 0; }
      55%, 85%      { transform: scaleX(1); opacity: 1; }
      95%, 100%     { transform: scaleX(0); opacity: 0; }
    }
    .dot-pulse {
      animation: dot-p 3.5s ease-in-out infinite;
    }
    @keyframes dot-p {
      0%, 40%   { r: 2; opacity: 0; }
      55%, 85%  { r: 3; opacity: 1; }
      95%, 100% { r: 2; opacity: 0; }
    }
  </style>

  <!-- Card shadow -->
  <rect x="11" y="11" width="42" height="42" rx="6" fill="#555" opacity="0.12"/>

  <!-- Card back (flag stripes placeholder) -->
  <g class="card-back">
    <rect x="9" y="9" width="42" height="42" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
    <line x1="9"  y1="23" x2="51" y2="23" stroke="#4caf50" stroke-width="1.5" opacity="0.5"/>
    <line x1="9"  y1="37" x2="51" y2="37" stroke="#4caf50" stroke-width="1.5" opacity="0.5"/>
    <rect x="14" y="14" width="32" height="8" rx="2" fill="#4caf50" opacity="0.3"/>
  </g>

  <!-- Card front (question mark) -->
  <g class="card-front">
    <rect x="9" y="9" width="42" height="42" rx="6" fill="#e3f2fd" stroke="#1a73e8" stroke-width="2"/>
  </g>
  <!-- ? symbol (separate so we can animate independently) -->
  <g class="question-mark">
    <text x="32" y="40" text-anchor="middle" font-size="26" font-weight="bold"
          fill="#1a73e8" font-family="Georgia, serif">?</text>
  </g>
  <circle class="dot-pulse" cx="32" cy="47" r="3" fill="#1a73e8"/>
</svg>
