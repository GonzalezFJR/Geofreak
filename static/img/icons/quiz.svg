<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <style>
    .card-back {
      transform-origin: 32px 32px;
      animation: show-back 4s ease-in-out infinite;
    }
    .card-front {
      transform-origin: 32px 32px;
      animation: show-front 4s ease-in-out infinite;
    }
    @keyframes show-back {
      0%, 38%  { transform: scaleX(1); }
      45%, 55% { transform: scaleX(0); }
      62%, 100% { transform: scaleX(1); }
    }
    @keyframes show-front {
      0%, 38%  { transform: scaleX(0); }
      45%, 55% { transform: scaleX(1); }
      62%, 100% { transform: scaleX(0); }
    }
    .q-mark {
      transform-origin: 32px 30px;
      animation: show-front 4s ease-in-out infinite;
    }
  </style>

  <!-- Drop shadow -->
  <rect x="12" y="13" width="42" height="44" rx="7" fill="#0001" />

  <!-- Card back: flag-style stripes -->
  <g class="card-back">
    <rect x="10" y="10" width="44" height="44" rx="6" fill="#fff8e1" stroke="#f9a825" stroke-width="1.8"/>
    <!-- Flag stripe top (solid) -->
    <rect x="10" y="10" width="44" height="15" rx="6" fill="#f9a825" opacity="0.85"/>
    <rect x="10" y="22" width="44" height="3" rx="0" fill="#f9a825" opacity="0.85"/>
    <!-- Middle stripe white area -->
    <rect x="10" y="25" width="44" height="14" fill="white" opacity="0.9"/>
    <!-- Bottom stripe -->
    <rect x="10" y="39" width="44" height="15" rx="0" fill="#4caf50" opacity="0.75"/>
    <rect x="10" y="48" width="44" height="6" rx="0" fill="#4caf50" opacity="0.75"/>
  </g>

  <!-- Card front: clean blue with ? -->
  <g class="card-front">
    <rect x="10" y="10" width="44" height="44" rx="6" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.8"/>
    <!-- Inner subtle decoration -->
    <circle cx="32" cy="32" r="16" fill="#1a73e8" opacity="0.07"/>
  </g>
  <g class="q-mark">
    <text x="32" y="39" text-anchor="middle"
          font-size="28" font-weight="800" fill="#1a73e8"
          font-family="Georgia, 'Times New Roman', serif"
          letter-spacing="-1">?</text>
  </g>
</svg>
