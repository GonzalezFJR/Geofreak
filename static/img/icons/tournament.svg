<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <style>
    .shine {
      animation: shine 3s ease-in-out infinite;
    }
    @keyframes shine {
      0%, 100% { opacity: 0; }
      45%, 55% { opacity: 0.55; }
    }
    .s1 { animation: sparkle 2.2s ease-in-out infinite 0s; }
    .s2 { animation: sparkle 2.2s ease-in-out infinite 0.55s; }
    .s3 { animation: sparkle 2.2s ease-in-out infinite 1.1s; }
    .s4 { animation: sparkle 2.2s ease-in-out infinite 1.65s; }
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0.3); }
      40%, 60% { opacity: 1; transform: scale(1); }
    }
  </style>

  <!-- Trophy cup body -->
  <path d="M17,6 L47,6 L44,33 C44,40 39,45 32,45 C25,45 20,40 20,33 Z"
        fill="#ffc107" stroke="#f57f17" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Shine streak inside cup -->
  <path class="shine" d="M23,10 L25,34" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Left handle -->
  <path d="M17,10 C9,10 5,16 5,22 C5,28 11,31 17,29"
        stroke="#f57f17" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Right handle -->
  <path d="M47,10 C55,10 59,16 59,22 C59,28 53,31 47,29"
        stroke="#f57f17" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Stem -->
  <rect x="29" y="45" width="6" height="8" rx="1.5" fill="#ffc107" stroke="#f57f17" stroke-width="1.5"/>
  <!-- Base -->
  <rect x="21" y="53" width="22" height="5" rx="2.5" fill="#ffc107" stroke="#f57f17" stroke-width="1.5"/>

  <!-- Sparkle stars -->
  <!-- Top-left star -->
  <path class="s1" style="transform-origin:10px 14px"
    d="M10,11 L11,13.6 L13.6,13.6 L11.6,15.2 L12.4,18 L10,16.4 L7.6,18 L8.4,15.2 L6.4,13.6 L9,13.6 Z"
    fill="#fff59d"/>
  <!-- Top-right star -->
  <path class="s2" style="transform-origin:54px 14px"
    d="M54,11 L55,13.6 L57.6,13.6 L55.6,15.2 L56.4,18 L54,16.4 L51.6,18 L52.4,15.2 L50.4,13.6 L53,13.6 Z"
    fill="#fff59d"/>
  <!-- Mid-left star (smaller) -->
  <path class="s3" style="transform-origin:6px 29px"
    d="M6,27 L6.8,29 L8.8,29 L7.3,30.2 L7.8,32.3 L6,31 L4.2,32.3 L4.7,30.2 L3.2,29 L5.2,29 Z"
    fill="#fff59d"/>
  <!-- Mid-right star (smaller) -->
  <path class="s4" style="transform-origin:58px 29px"
    d="M58,27 L58.8,29 L60.8,29 L59.3,30.2 L59.8,32.3 L58,31 L56.2,32.3 L56.7,30.2 L55.2,29 L57.2,29 Z"
    fill="#fff59d"/>
</svg>
