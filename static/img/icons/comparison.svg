<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none" overflow="visible">
  <style>
    .balance {
      transform-origin: 32px 22px;
      animation: tilt 3s ease-in-out infinite;
    }
    @keyframes tilt {
      0%, 100% { transform: rotate(0deg); }
      25%  { transform: rotate(-14deg); }
      75%  { transform: rotate(14deg); }
    }
  </style>

  <!-- Stand pole -->
  <line x1="32" y1="22" x2="32" y2="54" stroke="#6a1b9a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Stand base -->
  <rect x="21" y="53" width="22" height="4.5" rx="2.25" fill="#6a1b9a" opacity="0.55"/>

  <!-- Rotating balance (beam + strings + pans) -->
  <g class="balance">
    <!-- Beam -->
    <line x1="8" y1="22" x2="56" y2="22" stroke="#6a1b9a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Pivot cap -->
    <circle cx="32" cy="22" r="3.5" fill="#6a1b9a"/>

    <!-- Left string -->
    <line x1="8" y1="22" x2="8" y2="37" stroke="#6a1b9a" stroke-width="1.5"/>
    <!-- Left pan -->
    <path d="M1,39 Q8,36.5 15,39" stroke="#6a1b9a" stroke-width="2.2"
          fill="#6a1b9a" fill-opacity="0.2" stroke-linecap="round"/>

    <!-- Right string -->
    <line x1="56" y1="22" x2="56" y2="37" stroke="#6a1b9a" stroke-width="1.5"/>
    <!-- Right pan -->
    <path d="M49,39 Q56,36.5 63,39" stroke="#6a1b9a" stroke-width="2.2"
          fill="#6a1b9a" fill-opacity="0.2" stroke-linecap="round"/>
  </g>
</svg>
