<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" fill="none">
  <defs>
    <clipPath id="flag-clip-ru">
      <rect x="2" y="2" width="36" height="36" rx="3"/>
    </clipPath>
  </defs>

  <!-- White base -->
  <rect x="2" y="2" width="36" height="36" rx="3" fill="white"/>

  <!-- White top strip (~12px) -->
  <rect x="2" y="2"  width="36" height="12" fill="#ffffff" clip-path="url(#flag-clip-ru)"/>

  <!-- Blue middle strip (~12px) -->
  <rect x="2" y="14" width="36" height="12" fill="#0039a6" clip-path="url(#flag-clip-ru)"/>

  <!-- Red bottom strip (~12px) -->
  <rect x="2" y="26" width="36" height="12" fill="#d52b1e" clip-path="url(#flag-clip-ru)"/>

  <!-- Light gray border -->
  <rect x="2" y="2" width="36" height="36" rx="3" stroke="#d1d5db" stroke-width="1" fill="none"/>
</svg>
