<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="globe-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="land-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Globe background -->
  <circle cx="100" cy="90" r="75" fill="url(#globe-grad)" />
  <!-- Simplified continent shapes -->
  <!-- Americas -->
  <path d="M60,40 Q55,55 50,65 Q48,75 52,85 Q50,95 45,105 Q42,115 48,120 Q55,125 55,135 L58,140 Q62,135 60,125 Q65,115 70,110 Q72,100 68,90 Q70,80 72,70 Q75,60 70,50 Q65,42 60,40Z" fill="url(#land-grad)" opacity="0.9"/>
  <!-- Europe/Africa -->
  <path d="M95,35 Q100,40 108,42 Q115,45 118,55 Q120,65 115,75 Q112,85 108,95 Q105,105 108,115 Q110,125 105,135 Q100,140 95,135 Q90,125 92,115 Q88,105 90,95 Q92,85 95,75 Q92,65 90,55 Q88,45 95,35Z" fill="url(#land-grad)" opacity="0.9"/>
  <!-- Asia -->
  <path d="M120,38 Q130,35 140,40 Q148,48 150,58 Q148,68 142,75 Q138,80 140,88 Q135,92 128,88 Q122,82 118,75 Q115,65 118,55 Q120,48 120,38Z" fill="url(#land-grad)" opacity="0.9"/>
  <!-- Australia -->
  <path d="M138,100 Q145,98 150,102 Q155,108 152,115 Q148,118 142,116 Q138,112 136,106 Q136,102 138,100Z" fill="url(#land-grad)" opacity="0.9"/>
  <!-- Grid lines -->
  <ellipse cx="100" cy="90" rx="75" ry="30" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <ellipse cx="100" cy="90" rx="75" ry="55" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <line x1="100" y1="15" x2="100" y2="165" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <ellipse cx="100" cy="90" rx="30" ry="75" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
  <!-- Globe shine -->
  <circle cx="78" cy="60" r="20" fill="rgba(255,255,255,0.12)" />
  <!-- Text -->
  <text x="100" y="188" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="#1a73e8" letter-spacing="1">
    <tspan>Geo</tspan><tspan fill="#4caf50">Freak</tspan>
  </text>
</svg>
