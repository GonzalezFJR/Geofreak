version: "3.9"

services:
  geofreak:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${DOCKER_CONTAINER_NAME:-geofreak-app}
    image: ${DOCKER_IMAGE_NAME:-geofreak}:latest
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-eu-west-1}
      - DYNAMODB_TABLE_PREFIX=${DYNAMODB_TABLE_PREFIX:-geofreak_}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-geofreak-assets}
    volumes:
      - ./static/data:/app/static/data
    restart: unless-stopped
